[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
# Test files: stub-package imports (lancedb/pyarrow/unstructured) are intentionally
# imported for conftest.py compatibility; E402 and E722 common in test helpers
"tests/*.py" = ["F401", "E402", "E722", "F821"]
"test_*.py" = ["F401", "E402", "E722", "F821"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
